  <text x="200" y="862" font-size="10" fill="#718096">ZINK</text>
  <text x="420" y="862" font-size="10" fill="#718096">203dpi</text>
  <text x="580" y="862" font-size="10" fill="#2d3748">¥45</text>
  <text x="680" y="862" font-size="10" fill="#718096">凯胜诺/汉印</text>

  <!-- Row 3 -->
