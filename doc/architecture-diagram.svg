  <text x="122" y="302" text-anchor="middle" font-size="20">🔊</text>
  <text x="122" y="320" text-anchor="middle" font-size="12" font-weight="600" fill="#2d3748">离线唤醒引擎</text>
  <text x="122" y="335" text-anchor="middle" font-size="9" fill="#718096">启英泰伦CI130x</text>
  <text x="122" y="347" text-anchor="middle" font-size="9" fill="#718096">零延迟唤醒·无需网络</text>

