  <text x="200" y="845" font-size="10" fill="#718096">全志V3s</text>
  <text x="420" y="845" font-size="10" fill="#718096">ARM Cortex-A7</text>
  <text x="580" y="845" font-size="10" fill="#2d3748">¥35</text>
