  <rect x="200" y="276" width="140" height="74" rx="10" fill="#fff" stroke="#f6e05e" stroke-width="1.5" filter="url(#card-shadow)"/>
  <text x="270" y="302" text-anchor="middle" font-size="20">🎤</text>
  <text x="270" y="320" text-anchor="middle" font-size="12" font-weight="600" fill="#2d3748">语音采集&amp;降噪</text>
  <text x="270" y="335" text-anchor="middle" font-size="9" fill="#718096">麦克风阵列</text>
  <text x="270" y="347" text-anchor="middle" font-size="9" fill="#718096">环境降噪·音频编码</text>

