  <rect x="496" y="276" width="140" height="74" rx="10" fill="#fff" stroke="#f6e05e" stroke-width="1.5" filter="url(#card-shadow)"/>
  <text x="566" y="302" text-anchor="middle" font-size="20">📋</text>
  <text x="566" y="320" text-anchor="middle" font-size="12" font-weight="600" fill="#2d3748">打印队列管理</text>
