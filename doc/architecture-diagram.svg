  <text x="399" y="648" text-anchor="middle" font-size="12" font-weight="600" fill="#2d3748">内容管理后台</text>
  <text x="399" y="662" text-anchor="middle" font-size="9" fill="#718096">模板管理·内容审核·OTA升级</text>

