  <text x="418" y="320" text-anchor="middle" font-size="12" font-weight="600" fill="#2d3748">图片渲染引擎</text>
  <text x="418" y="335" text-anchor="middle" font-size="9" fill="#718096">图像解码·尺寸适配</text>
  <text x="418" y="347" text-anchor="middle" font-size="9" fill="#718096">打印灰度转换</text>

