  <text x="200" y="822" font-size="11" font-weight="600" fill="#4a5568">型号</text>
  <text x="420" y="822" font-size="11" font-weight="600" fill="#4a5568">规格</text>
  <text x="580" y="822" font-size="11" font-weight="600" fill="#4a5568">成本</text>
  <text x="680" y="822" font-size="11" font-weight="600" fill="#4a5568">供应商</text>
  <line x1="50" y1="828" x2="790" y2="828" stroke="#edf2f7" stroke-width="1"/>

  <!-- Row 1 -->
