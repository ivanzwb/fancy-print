  <text x="150" y="738" font-size="10" fill="#cbd5e0">→</text>
  <text x="168" y="738" font-size="10" fill="#718096">② 设备唤醒+录音</text>
  <text x="272" y="738" font-size="10" fill="#cbd5e0">→</text>
  <text x="290" y="738" font-size="10" fill="#718096">③ 云端ASR识别</text>
  <text x="394" y="738" font-size="10" fill="#cbd5e0">→</text>
  <text x="412" y="738" font-size="10" fill="#718096">④ LLM生成Prompt</text>
  <text x="516" y="738" font-size="10" fill="#cbd5e0">→</text>
  <text x="534" y="738" font-size="10" fill="#718096">⑤ 通义万相出图</text>
  <text x="638" y="738" font-size="10" fill="#cbd5e0">→</text>
  <text x="656" y="738" font-size="10" fill="#718096">⑥ 安全审核→设备打印→孩子拿到涂色页</text>

