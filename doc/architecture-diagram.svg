  <text x="200" y="879" font-size="10" fill="#718096">启英+讯飞</text>
  <text x="420" y="879" font-size="10" fill="#718096">离线唤醒+在线ASR</text>
  <text x="580" y="879" font-size="10" fill="#2d3748">¥35</text>
  <text x="680" y="879" font-size="10" fill="#718096">成都/合肥</text>

  <!-- Total -->
  <line x1="50" y1="886" x2="790" y2="886" stroke="#e2e8f0" stroke-width="1"/>
  <text x="60" y="900" font-size="11" font-weight="600" fill="#2d3748">整机成本合计（含开模分摊+组装）</text>
