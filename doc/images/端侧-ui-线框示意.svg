  <text x="984" y="44" text-anchor="middle" class="doc-title">整机儿童端 UI 线框（横屏优先布局）</text>
  <text x="984" y="68" text-anchor="middle" class="doc-sub">①② 与基准图同壳；右侧工具与左侧「涂色乐园」绑定示意；③ 本机设置；非 OEM 定稿</text>
