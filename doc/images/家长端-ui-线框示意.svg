      <text x="32" y="100" class="scr-body">账号与安全</text>
      <rect class="feed-row" x="18" y="124" width="252" height="44" rx="10" ry="10"/>
      <text x="32" y="152" class="scr-body">家庭与成员</text>
      <rect class="feed-row" x="18" y="176" width="252" height="44" rx="10" ry="10"/>
      <text x="32" y="204" class="scr-body">隐私与数据</text>
      <rect class="feed-row" x="18" y="228" width="252" height="44" rx="10" ry="10"/>
      <text x="32" y="256" class="scr-body">帮助与客服</text>
      <rect class="feed-row" x="18" y="280" width="252" height="44" rx="10" ry="10"/>
      <text x="32" y="308" class="scr-body">ZINK 纸购买入口</text>
      <rect class="tabbar" x="10" y="446" width="268" height="52"/>
      <text x="48" y="478" text-anchor="middle" class="tab-inact">首页</text>
      <text x="120" y="478" text-anchor="middle" class="tab-inact">动态</text>
      <text x="192" y="478" text-anchor="middle" class="tab-inact">策略</text>
      <text x="236" y="478" text-anchor="middle" class="tab-active">我的</text>
    </g>
  </g>
  <text x="832" y="668" text-anchor="middle" class="doc-sub">与云端家长 BFF 见《服务器端设计》§2.4.2；底栏 Tab 为示意，可按 PRD 调整</text>
</svg>
