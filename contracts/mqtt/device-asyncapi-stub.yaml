asyncapi: 2.6.0
info:
  title: fancy-print cloud ↔ device (MQTT subset)
  version: 0.2.0
  description: >
    Subset aligned with doc/4 §2.4.3. Broker URL is deployment-specific; payloads are JSON.
defaultContentType: application/json
servers:
  production:
    url: mqtts://mqtt.example.com
    protocol: mqtts
channels:
  devices/{deviceId}/jobs/{jobId}/status:
    description: Cloud pushes job state updates to the device
    parameters:
      deviceId:
        schema: { type: string }
      jobId:
        schema: { type: string }
    subscribe:
      message:
        payload:
          type: object
          properties:
            state: { type: string }
            preview_url: { type: string, nullable: true }
            preview_url_ttl:
              type: integer
              nullable: true
              description: Seconds remaining until preview_url expires (null if N/A)
            preview_url_expires_at:
              type: string
              format: date-time
              nullable: true
            transcript: { type: string, nullable: true }
            chunks_max_seq: { type: integer, nullable: true }
            error_code: { type: string, nullable: true }
            policy_version: { type: integer, nullable: true }
  devices/{deviceId}/policy:
    description: Cloud pushes policy updates
    parameters:
      deviceId:
        schema: { type: string }
    subscribe:
      message:
        payload:
          type: object
          properties:
            version: { type: integer }
            hash: { type: string }
            apply_after: { type: string, format: date-time }
            body: { type: object, nullable: true }
  devices/{deviceId}/telemetry:
    description: >-
      Device (or dev tool) publishes de-sanitized summary; cloud `device-api` may subscribe when
      MQTT_SUBSCRIBE_TELEMETRY is set. HTTPS alternative POST /v1/devices/telemetry.
    parameters:
      deviceId:
        schema: { type: string }
    publish:
      message:
        payload:
          type: object
          properties:
            firmware_version: { type: string }
            rssi_dbm: { type: number, nullable: true }
            uptime_sec: { type: integer, minimum: 0, nullable: true }
